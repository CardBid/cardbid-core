version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cardbid_postgres
    environment:
      POSTGRES_DB: cardbid_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: cardbid_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
