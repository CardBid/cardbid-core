version: "3.8"

services:
  db:
    image: postgres:15
    container_name: cardbid_postgres
    environment:
      POSTGRES_DB: cardbid_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: cardbid_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: cardbid_backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cardbid_db
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: cardbid_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
