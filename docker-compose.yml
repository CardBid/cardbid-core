services:
  db:
    image: postgres:15
    container_name: cardbid_postgres
    environment:
      POSTGRES_DB: cardbid_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cardbid_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: cardbid_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: cardbid_backend
    
    command: >
      sh -c "
        sleep 5 &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 core.asgi:application
      "

    volumes:
      - ./backend:/app
      - ./media:/app/media
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=cardbid_db
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: cardbid_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: cardbid_mediamtx
    ports:
      - "1935:1935" # RTMP (OBS)
      - "8888:8888" # HLS (wyjście Frontend)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

volumes:
  postgres_data:
